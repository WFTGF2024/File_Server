server:
  port: 9004

spring:
  application:
    name: file-server
  datasource:
    url: jdbc:postgresql://localhost:5432/authentication_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
  mapper-locations: classpath*:/mapper/**/*.xml

# user_backend integration
user-backend:
  base-url: http://localhost:9000/api
  validate-url: /auth/validate
  user-info-url: /auth/user-info

# File storage configuration
file:
  storage:
    provider: local
    local:
      base-path: /home/ubuntu/Code/wftgf_top/personal-site/data/file
    allowed-default-types: .jpg,.jpeg,.png,.gif,.bmp,.svg,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.7z,.mp4,.mp3,.avi,.mkv,.csv,.json,.xml

# Cache TTL configuration
cache:
  policy:
    ttl: 30
  quota:
    ttl: 5
  folder-tree:
    ttl: 10

logging:
  level:
    com.example.fileserver: DEBUG
    com.baomidou.mybatisplus: DEBUG
